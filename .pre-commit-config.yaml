# https://pre-commit.com
default_install_hook_types:
  - pre-commit
  - post-checkout
  - post-merge
  - post-rewrite

# TODO: install only ruff, evaluator, pytest hooks
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements #Check for debugger imports and breakpoint() in python files
        stages: [pre-commit]
      - id: check-ast #Simply check whether files parse as valid python
        stages: [pre-commit]
      - id: fix-byte-order-marker #removes UTF-8 byte order marker
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: detect-private-key # detect-private-key is not in repo
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: check-case-conflict #Check for files with names that would conflict on a case-insensitive filesystem like MacOS HFS+ or Windows FAT
        stages: [pre-commit]
      - id: end-of-file-fixer #Makes sure files end in a newline and only a newline
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: "v0.47.0"
    hooks:
      - id: markdownlint
        args: ["-f", "--disable", "MD051", "--disable", "MD013"]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        language: python
        args: [--fix, --exit-non-zero-on-fix, --line-length=79]
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff-format
        entry: ruff format
        language: python
        args: [--line-length=79]
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs #blacken-docs is a pre-commit hook that runs to check for issues in the docs
        additional_dependencies: [black]
        stages: [pre-commit]
  # TODO: use ty as VSCode extension instead of pre-commit hook
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check # unresolved-import currently (Feb 2026) has stability issues
        language: python
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: evaluator-deterministic
        name: evaluator deterministic (HasMatchingSpan, no LLMJudge)
        language: system
        entry: bash -c 'uv run scripts/login.py && EVAL_CASES=builtin_tools EVAL_SKIP_LLM_JUDGE=1 uv run evaluator.py'
        pass_filenames: false
        stages: [pre-push]
        files: ^(lib/prompts/|src/assistant/prompts/)
  - repo: local
    hooks:
      - id: pytest-check
        name: pytest-check
        language: system
        types: [python]
        entry: make test
        pass_filenames: false
        always_run: false
        stages: [pre-push]
  - repo: https://github.com/roy-ht/pre-commit-jupyter
    rev: v1.2.1
    hooks:
      - id: jupyter-notebook-cleanup
        args:
          - --remove-kernel-metadata
          - --pin-patterns
          - "[pin];[donotremove]"
        stages: [pre-push]
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.8
    hooks:
      - id: commitizen
        stages: [commit-msg]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.5
    hooks:
      - id: uv-sync
        args: ["--frozen"]
